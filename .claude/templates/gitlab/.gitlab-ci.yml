# ── Security Stage ─────────────────────────────────────────────────

# Secret detection using GitLab built-in template
secret-detection:
  stage: security
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "schedule"

# Dependency scanning (GitLab Ultimate, or use trivy below)
# dependency-scanning:
#   stage: security
#   rules:
#     - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# Open-source alternative: Trivy vulnerability scanner
trivy-scan:
  stage: security
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "schedule"
  script:
    - trivy fs --severity HIGH,CRITICAL --exit-code 1 .
  allow_failure: true

# ── Release Stage ──────────────────────────────────────────────────

release:
  stage: release
  image: python:3.12-alpine
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
  before_script:
    - apk add --no-cache git
  script:
    - |
      PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
      RANGE="${PREV_TAG:+${PREV_TAG}..}HEAD"
      NOTES=$(git log "$RANGE" --pretty=format:"%H|%s|%b---END---" | \
        python3 .claude/scripts/release_manager.py parse-commits | \
        python3 .claude/scripts/release_manager.py generate-changelog \
          --version "$CI_COMMIT_TAG" --date "$(date +%Y-%m-%d)")
      echo "$NOTES" > /tmp/release-notes.md
  release:
    tag_name: $CI_COMMIT_TAG
    description: /tmp/release-notes.md
