# Issue Auto-Triage Workflow
# Generated by claude-task-development-framework
#
# Automatically labels new issues based on keywords matching
# the framework's label taxonomy (task, idea, priority levels).

name: Issue Triage

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  triage:
    name: Auto-label Issue
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          sparse-checkout: .claude/issues-tracker.json
          sparse-checkout-cone-mode: false

      - name: Triage issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          LABELS=""

          # ── Detect type: task vs idea ──────────────────────────────
          TITLE_LOWER=$(echo "$ISSUE_TITLE" | tr '[:upper:]' '[:lower:]')
          BODY_LOWER=$(echo "$ISSUE_BODY" | tr '[:upper:]' '[:lower:]')
          COMBINED="$TITLE_LOWER $BODY_LOWER"

          if echo "$COMBINED" | grep -qiE '\b(idea|proposal|suggestion|concept|brainstorm)\b'; then
            LABELS="idea"
          else
            LABELS="task"
          fi

          # ── Detect priority ────────────────────────────────────────
          if echo "$COMBINED" | grep -qiE '\b(urgent|critical|blocker|asap|p0|severity.?1)\b'; then
            LABELS="$LABELS,priority:high"
          elif echo "$COMBINED" | grep -qiE '\b(important|should.?have|p1|severity.?2)\b'; then
            LABELS="$LABELS,priority:medium"
          elif echo "$COMBINED" | grep -qiE '\b(nice.?to.?have|low.?priority|minor|p2|p3)\b'; then
            LABELS="$LABELS,priority:low"
          fi

          # ── Detect common categories ───────────────────────────────
          if echo "$COMBINED" | grep -qiE '\b(bug|error|broken|crash|fix|regression)\b'; then
            LABELS="$LABELS,bug"
          fi
          if echo "$COMBINED" | grep -qiE '\b(security|vulnerability|cve|exploit|xss|injection)\b'; then
            LABELS="$LABELS,security"
          fi
          if echo "$COMBINED" | grep -qiE '\b(docs|documentation|readme|guide|tutorial)\b'; then
            LABELS="$LABELS,documentation"
          fi

          # ── Add source label ───────────────────────────────────────
          # Always mark as auto-triaged
          LABELS="$LABELS,claude-code"

          # ── Set initial status ─────────────────────────────────────
          LABELS="$LABELS,status:todo"

          # ── Apply labels ───────────────────────────────────────────
          echo "Applying labels: $LABELS"
          IFS=',' read -ra LABEL_ARRAY <<< "$LABELS"
          for label in "${LABEL_ARRAY[@]}"; do
            label=$(echo "$label" | xargs)  # trim whitespace
            if [ -n "$label" ]; then
              gh issue edit "$ISSUE_NUMBER" --add-label "$label" 2>/dev/null || \
                echo "  Label '$label' not found — create it with setup_labels.py"
            fi
          done

          echo "Issue #$ISSUE_NUMBER triaged successfully"
