name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "skills/**"
      - "scripts/**"
      - "config/**"
      - "templates/**"
      - "hooks/**"

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Read version from plugin manifest
        id: version
        run: |
          VERSION=$(jq -r '.version' .claude-plugin/plugin.json)
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check_tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi

          {
            echo "## What's Changed"
            echo ""
            git log "$RANGE" --pretty=format:"- %s" --no-merges 2>/dev/null || \
              git log -20 --pretty=format:"- %s" --no-merges
            echo ""
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG:-$(git rev-list --max-parents=0 HEAD)}...${{ steps.version.outputs.tag }}"
          } > /tmp/release-notes.md

      - name: Create zip archive
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          ZIP_NAME="codeclaw-${{ steps.version.outputs.version }}.zip"
          git archive --format=zip --prefix=codeclaw/ HEAD \
            -o "/tmp/${ZIP_NAME}"
          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"

      - name: Create tag and release
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"

          gh release create "$TAG" \
            "/tmp/${ZIP_NAME}#${ZIP_NAME}" \
            --repo "${{ github.repository }}" \
            --title "Release ${TAG}" \
            --notes-file /tmp/release-notes.md

      - name: Skip (tag already exists)
        if: steps.check_tag.outputs.exists == 'true'
        run: |
          echo "::warning::Tag ${{ steps.version.outputs.tag }} already exists. Bump the version in .claude-plugin/plugin.json to create a new release."
