name: Release

on:
  push:
    branches:
      - main
    paths:
      - "skills/**"
      - "scripts/**"
      - "config/**"
      - "templates/**"
      - "hooks/**"
      - "CLAUDE.md"

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Generate version tag
        id: version
        run: |
          DATE=$(date +%Y.%m.%d)
          # Count releases on this date for incrementing
          EXISTING=$(git tag -l "${DATE}.*" | wc -l)
          VERSION="${DATE}.$((EXISTING + 1))"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi

          {
            echo "## What's Changed"
            echo ""
            git log "$RANGE" --pretty=format:"- %s" --no-merges 2>/dev/null || \
              git log -20 --pretty=format:"- %s" --no-merges
            echo ""
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG:-$(git rev-list --max-parents=0 HEAD)}...${{ steps.version.outputs.tag }}"
          } > /tmp/release-notes.md

      - name: Create zip archive
        run: |
          ZIP_NAME="claude-task-development-framework-${{ steps.version.outputs.version }}.zip"
          git archive --format=zip --prefix=claude-task-development-framework/ HEAD \
            -o "/tmp/${ZIP_NAME}"
          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"

          gh release create "$TAG" \
            "/tmp/${ZIP_NAME}#${ZIP_NAME}" \
            --repo "${{ github.repository }}" \
            --title "Release ${TAG}" \
            --notes-file /tmp/release-notes.md
