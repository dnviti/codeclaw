# CI Pipeline — Lint, Test & Build
# Configured for Python 3.12 (CodeClaw)
# Cross-platform: runs on Linux, macOS, and Windows

name: CI

on:
  pull_request:
    branches: [main, develop, staging]
  merge_group:
    types: [checks_requested]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test-build:
    name: Lint, Test & Build
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Detect Python command (Unix)
        if: runner.os != 'Windows'
        id: py_unix
        run: |
          if command -v python3 &>/dev/null; then
            echo "cmd=python3" >> "$GITHUB_OUTPUT"
          else
            echo "cmd=python" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect Python command (Windows)
        if: runner.os == 'Windows'
        id: py_win
        shell: pwsh
        run: |
          if (Get-Command python3 -ErrorAction SilentlyContinue) {
            "cmd=python3" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            "cmd=python" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      - name: Set Python command
        id: py
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            echo "cmd=${{ steps.py_win.outputs.cmd }}" >> "$GITHUB_OUTPUT"
          else
            echo "cmd=${{ steps.py_unix.outputs.cmd }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: |
          ${{ steps.py.outputs.cmd }} -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint
        run: |
          ${{ steps.py.outputs.cmd }} -m flake8 scripts/ --count --select=E9,F63,F7,F82 --show-source --statistics || true

      - name: Syntax check core scripts
        run: |
          ${{ steps.py.outputs.cmd }} -m py_compile scripts/release_manager.py
          ${{ steps.py.outputs.cmd }} -m py_compile scripts/task_manager.py
          ${{ steps.py.outputs.cmd }} -m py_compile scripts/skill_helper.py
          ${{ steps.py.outputs.cmd }} -m py_compile scripts/vector_memory.py
          ${{ steps.py.outputs.cmd }} -m py_compile scripts/mcp_server.py

      - name: Run tests
        run: |
          ${{ steps.py.outputs.cmd }} -m pytest --tb=short -q
