# Release Pipeline
# Generated by claude-task-development-framework
#
# Triggered when a version tag is pushed. Creates a GitHub Release
# with changelog notes generated by release_manager.py.
#
# Docker tagging strategy:
#   main push (release tag) → builds "stable" + "vX.X.X" Docker tags
#   staging push             → builds "latest" Docker tag (see staging-merge.yml)

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Python (for release_manager.py)
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Get previous tag
        id: prev_tag
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "tag=$PREV_TAG" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${{ github.ref_name }}"
          PREV="${{ steps.prev_tag.outputs.tag }}"
          RANGE="${PREV:+${PREV}..}HEAD"

          COMMITS=$(git log "$RANGE" --pretty=format:"%H|%s|%b---END---" 2>/dev/null || echo "")
          NOTES=$(echo "$COMMITS" | python3 .claude/scripts/release_manager.py parse-commits | python3 .claude/scripts/release_manager.py generate-changelog --version "$TAG" --date "$(date +%Y-%m-%d)")

          # Write to file for the release step
          echo "$NOTES" > /tmp/release-notes.md

      - name: Build .ccpkg package
        id: ccpkg
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          python3 scripts/build_ccpkg.py \
            --version "$VERSION" \
            --output dist \
            --lock \
            --json > /tmp/ccpkg-result.json
          echo "archive=dist/ctdf-${VERSION}.ccpkg" >> "$GITHUB_OUTPUT"
          echo "lock=dist/ccpkg-lock.json" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --notes-file /tmp/release-notes.md

      - name: Upload .ccpkg release asset
        if: ${{ steps.ccpkg.outputs.archive != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            "${{ steps.ccpkg.outputs.archive }}" \
            --repo "${{ github.repository }}" \
            --clobber
          if [ -f "${{ steps.ccpkg.outputs.lock }}" ]; then
            gh release upload "${{ github.ref_name }}" \
              "${{ steps.ccpkg.outputs.lock }}" \
              --repo "${{ github.repository }}" \
              --clobber
          fi

      - name: Build portable distribution
        id: portable
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          python3 scripts/build_portable.py \
            --version "$VERSION" \
            --output dist \
            --json > /tmp/build-result.json
          echo "archive=dist/ctdf-${VERSION}-portable.zip" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload portable distribution to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARCHIVE="${{ steps.portable.outputs.archive }}"
          if [ -f "$ARCHIVE" ]; then
            gh release upload "${{ github.ref_name }}" \
              "$ARCHIVE" \
              --repo "${{ github.repository }}" \
              --clobber
            echo "Uploaded portable distribution: $ARCHIVE"
          else
            echo "::warning::Portable archive not found at $ARCHIVE, skipping upload"
          fi

  docker-release:
    name: Build Docker (stable + versioned)
    needs: release
    runs-on: ubuntu-latest
    # Remove the 'if' below once you have a Dockerfile
    if: ${{ hashFiles('Dockerfile') != '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # [DOCKER_REGISTRY_LOGIN] — replace with your registry login
      # - name: Log in to registry
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ghcr.io
      #     username: ${{ github.actor }}
      #     password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (stable + versioned)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:stable
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
