# Staging Validation Pipeline
# Generated by claude-task-development-framework
#
# This workflow runs when code is pushed to the staging branch.
# It validates the staging environment before promotion to main.
# Replace [PLACEHOLDERS] with your project-specific values during
# /setup init or manually.
#
# Docker tagging strategy:
#   staging push  → builds the "latest" Docker tag
#   main push     → builds "stable" + "vX.X.X" Docker tags (see release.yml)

name: Staging Validation

on:
  push:
    branches: [staging]

permissions:
  contents: read
  packages: write

concurrency:
  group: staging-${{ github.sha }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # ── Runtime setup ──────────────────────────────────────────────
      # [CI_RUNTIME_SETUP] — replaced by /setup init
      # Example:
      # - name: Setup Node.js
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: 22

      # ── Install dependencies ───────────────────────────────────────
      # [INSTALL_COMMAND] — replaced by /setup init
      - name: Install dependencies
        run: echo "Replace with your install command (e.g., npm ci, pip install -r requirements.txt)"

      # ── Run full test suite ────────────────────────────────────────
      # [VERIFY_COMMAND] — replaced by /setup init
      - name: Run integration tests
        run: echo "Replace with your verify command (e.g., npm run verify, pytest)"

      # ── Build validation ───────────────────────────────────────────
      # [BUILD_COMMAND] — replaced by /setup init
      - name: Build
        run: echo "Replace with your build command (e.g., npm run build)"

  docker-latest:
    name: Build Docker (latest)
    needs: validate
    runs-on: ubuntu-latest
    # Remove the 'if' below once you have a Dockerfile
    if: ${{ hashFiles('Dockerfile') != '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # [DOCKER_REGISTRY_LOGIN] — replace with your registry login
      # - name: Log in to registry
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ghcr.io
      #     username: ${{ github.actor }}
      #     password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (latest)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
