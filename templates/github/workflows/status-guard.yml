# Status State Machine Guard
# Generated by codeclaw
#
# Enforces valid status label transitions on issues:
#   status:todo → status:in-progress → status:to-test → status:done
#
# If an invalid transition is attempted (e.g., skipping status:to-test),
# the invalid label is removed and a comment explains the allowed transitions.

name: Status Guard

on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  validate-transition:
    name: Validate Status Transition
    runs-on: ubuntu-latest
    # Only run when a status label is added
    if: startsWith(github.event.label.name, 'status:')
    steps:
      - name: Check transition validity
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          NEW_LABEL: ${{ github.event.label.name }}
          REPO: ${{ github.repository }}
        run: |
          # ── Define valid transitions ───────────────────────────────
          # Format: "from_status:to_status"
          VALID_TRANSITIONS=(
            ":status:todo"                    # New issue can get status:todo
            "status:todo:status:in-progress"  # Pick up task
            "status:in-progress:status:to-test"  # Submit for testing
            "status:to-test:status:done"      # Testing passed
            "status:to-test:status:in-progress"  # Testing failed, back to work
          )

          # ── Get current labels on the issue ────────────────────────
          CURRENT_LABELS=$(gh issue view "$ISSUE_NUMBER" --repo "$REPO" \
            --json labels --jq '.labels[].name' 2>/dev/null)

          # Find the previous status label (excluding the one just added)
          PREV_STATUS=""
          while IFS= read -r label; do
            if [[ "$label" == status:* && "$label" != "$NEW_LABEL" ]]; then
              PREV_STATUS="$label"
              break
            fi
          done <<< "$CURRENT_LABELS"

          # ── Validate the transition ────────────────────────────────
          TRANSITION="${PREV_STATUS}:${NEW_LABEL}"
          VALID=false

          for valid_t in "${VALID_TRANSITIONS[@]}"; do
            if [[ "$TRANSITION" == "$valid_t" ]]; then
              VALID=true
              break
            fi
          done

          if [[ "$VALID" == "true" ]]; then
            echo "Valid transition: ${PREV_STATUS:-'(none)'} → $NEW_LABEL"

            # Remove the old status label if present
            if [[ -n "$PREV_STATUS" ]]; then
              gh issue edit "$ISSUE_NUMBER" --repo "$REPO" \
                --remove-label "$PREV_STATUS" 2>/dev/null || true
            fi
          else
            echo "INVALID transition: ${PREV_STATUS:-'(none)'} → $NEW_LABEL"

            # Remove the invalid label
            gh issue edit "$ISSUE_NUMBER" --repo "$REPO" \
              --remove-label "$NEW_LABEL" 2>/dev/null || true

            # Post explanation comment
            ALLOWED=""
            case "$PREV_STATUS" in
              "status:todo")
                ALLOWED="status:in-progress"
                ;;
              "status:in-progress")
                ALLOWED="status:to-test"
                ;;
              "status:to-test")
                ALLOWED="status:done or status:in-progress"
                ;;
              "status:done")
                ALLOWED="(close the issue instead)"
                ;;
              "")
                ALLOWED="status:todo"
                ;;
            esac

            gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body \
              "**Status transition blocked.** The label \`$NEW_LABEL\` cannot be applied directly from \`${PREV_STATUS:-'(no status)'}\`.

          **Valid next status:** \`$ALLOWED\`

          **Full transition order:**
          \`status:todo\` → \`status:in-progress\` → \`status:to-test\` → \`status:done\`

          The \`status:to-test\` step ensures all changes are verified before completion. This guard is enforced by the [status-guard workflow](/.github/workflows/status-guard.yml)."

            echo "Label removed and comment posted"
          fi
