# Agentic Fleet — Documentation Pipeline
# Generated by claude-task-development-framework
#
# Triggered when code is pushed to the release branch (excluding docs-only changes).
# Python static analysis generates codebase reports (zero tokens), then the AI agent
# runs documentation updates.
#
# Required secrets (set the one matching your provider):
#   ANTHROPIC_API_KEY — Claude API key (provider: claude)
#   OPENAI_API_KEY   — OpenAI API key (provider: openai)
#   OPENCLAW_API_KEY  — OpenClaw API key (provider: openclaw)
#
# Required repository variable:
#   AGENTIC_PROVIDER — AI provider to use: claude, openai, or openclaw

name: "Agentic Fleet — Docs"

on:
  push:
    branches: [develop]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: agentic-docs
  cancel-in-progress: true

jobs:
  # ── Job 1: Build memory + static analysis (Python, zero tokens) ────────
  build-and-analyze:
    name: Build Memory & Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: develop
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Generate codebase summary and analysis reports
        run: |
          python3 .claude/scripts/memory_builder.py generate \
            --output project-memory.md \
            --max-depth 4
          python3 .claude/scripts/codebase_analyzer.py analyze \
            --output-dir . \
            --memory project-memory.md

      - name: Upload analysis artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: fleet-analysis
          path: |
            project-memory.md
            report-infrastructure.md
            report-features.md
            report-quality.md
          retention-days: 1

  # ── Job 2: Documentation update ────────────────────────────────────────
  update-docs:
    name: "Update Docs"
    needs: build-and-analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "agentic-fleet[bot]"
          git config user.email "agentic-fleet[bot]@users.noreply.github.com"

      - name: Download analysis artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: fleet-analysis

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Run docs agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENCLAW_API_KEY: ${{ secrets.OPENCLAW_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AGENTIC_PROVIDER: ${{ vars.AGENTIC_PROVIDER }}
        run: |
          python3 .claude/scripts/agent_runner.py run --pipeline docs
