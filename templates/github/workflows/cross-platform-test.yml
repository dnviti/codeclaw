# Cross-Platform Smoke Tests
# Generated by codeclaw
#
# Verifies that core CodeClaw scripts run correctly on Windows, macOS,
# and Linux. This is a lightweight smoke test — it does not run the
# full project CI pipeline, only CodeClaw's own tooling.

name: Cross-Platform Tests

on:
  pull_request:
    branches: [main, develop, staging]
    paths:
      - "scripts/**"
      - "config/**"
      - ".github/workflows/cross-platform-test.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke-test:
    name: CodeClaw Smoke Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      # ── Detect Python command ────────────────────────────────────
      - name: Detect Python command
        id: detect-python
        shell: bash
        run: |
          if command -v python3 &>/dev/null; then
            echo "cmd=python3" >> "$GITHUB_OUTPUT"
          elif command -v python &>/dev/null; then
            echo "cmd=python" >> "$GITHUB_OUTPUT"
          else
            echo "cmd=python3" >> "$GITHUB_OUTPUT"
          fi

      # ── Platform detection ───────────────────────────────────────
      - name: Run platform_utils diagnostics
        shell: bash
        run: ${{ steps.detect-python.outputs.cmd }} scripts/platform_utils.py

      # ── skill_helper.py context ──────────────────────────────────
      - name: Smoke test — skill_helper context
        shell: bash
        run: |
          # context subcommand needs task files; create minimal stubs
          touch to-do.txt progressing.txt done.txt
          ${{ steps.detect-python.outputs.cmd }} scripts/skill_helper.py context --pipeline task || true

      # ── task_manager.py next-id ──────────────────────────────────
      - name: Smoke test — task_manager next-id
        shell: bash
        run: |
          # next-id needs at least one task file
          touch to-do.txt
          ${{ steps.detect-python.outputs.cmd }} scripts/task_manager.py next-id TEST || true
