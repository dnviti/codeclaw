# Continue.dev MCP integration for CodeClaw Vector Memory.
#
# Add this section to your .continue/config.yaml file.
# Replace ${CLAW_SCRIPTS} with the actual path to the CodeClaw scripts/ directory.
#
# Docs: https://docs.continue.dev/customize/model-context-protocol

experimental:
  modelContextProtocolServers:
    - name: claw-vector-memory
      transport:
        type: stdio
        command: python3
        args:
          - "${CLAW_SCRIPTS}/mcp_server.py"
          - "--root"
          - "."
      env:
        CLAW_PROJECT_ROOT: "."
