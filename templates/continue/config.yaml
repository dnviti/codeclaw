# Continue.dev MCP integration for CTDF Vector Memory.
#
# Add this section to your .continue/config.yaml file.
# Replace ${CTDF_SCRIPTS} with the actual path to the CTDF scripts/ directory.
#
# Docs: https://docs.continue.dev/customize/model-context-protocol

experimental:
  modelContextProtocolServers:
    - name: ctdf-vector-memory
      transport:
        type: stdio
        command: python3
        args:
          - "${CTDF_SCRIPTS}/mcp_server.py"
          - "--root"
          - "."
      env:
        CTDF_PROJECT_ROOT: "."
