# Agentic Fleet — Documentation Pipeline
# Generated by claude-task-development-framework
#
# Triggered when code is pushed to the release branch (excluding docs-only changes).
# Runs Python-based codebase analysis, then the AI agent
# runs documentation updates.
#
# Required CI/CD variables (Settings > CI/CD > Variables):
#   ANTHROPIC_API_KEY — Claude API key (masked, protected) — if provider is claude
#   OPENAI_API_KEY   — OpenAI API key (masked, protected) — if provider is openai
#   OPENCLAW_API_KEY  — OpenClaw API key (masked, protected) — if provider is openclaw
#   AGENTIC_PROVIDER — AI provider: claude, openai, or openclaw (NOT masked, NOT protected)

stages:
  - analyze
  - update-docs

variables:
  GIT_DEPTH: 0
  GIT_CHECKOUT_REF: develop

# ── Analyze Stage ──────────────────────────────────────────────────────

build-and-analyze:
  stage: analyze
  image: python:3.12-alpine
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $GIT_CHECKOUT_REF
      changes:
        # Only trigger on actual source code / business logic changes.
        # Customize these patterns to match your project structure.
        - "src/**/*"
        - "lib/**/*"
        - "app/**/*"
        - "server/src/**/*"
        - "client/src/**/*"
        - "prisma/**/*"
        - "package.json"
      when: always
    - if: $CI_PIPELINE_SOURCE == "web"
  before_script:
    - git checkout "$GIT_CHECKOUT_REF" && git pull origin "$GIT_CHECKOUT_REF"
  script:
    - >-
      python3 .claude/scripts/memory_builder.py generate
      --output project-memory.md
      --max-depth 4
    - >-
      python3 .claude/scripts/codebase_analyzer.py analyze
      --output-dir .
      --memory project-memory.md
  artifacts:
    paths:
      - project-memory.md
      - report-infrastructure.md
      - report-features.md
      - report-quality.md
    expire_in: 1 hour

# ── Update Docs Stage ─────────────────────────────────────────────────

update-docs:
  stage: update-docs
  image: node:22
  needs: [build-and-analyze]
  timeout: 30 minutes
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $GIT_CHECKOUT_REF
      when: always
    - if: $CI_PIPELINE_SOURCE == "web"
  before_script:
    - apt-get update -qq && apt-get install -y -qq python3 git > /dev/null
    - git checkout "$GIT_CHECKOUT_REF" && git pull origin "$GIT_CHECKOUT_REF"
    - git config user.name "agentic-fleet[bot]"
    - git config user.email "agentic-fleet[bot]@users.noreply.github.com"
  script:
    - python3 .claude/scripts/agent_runner.py run --pipeline docs
