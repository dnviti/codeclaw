# Staging Validation Pipeline (GitLab)
# Generated by codeclaw
#
# This pipeline runs when code is pushed to the staging branch.
# It validates the staging environment before promotion to main.
# Replace [PLACEHOLDERS] with your project-specific values during
# /setup init or manually.
#
# Docker tagging strategy:
#   staging push  → builds the "latest" Docker tag
#   main push     → builds "stable" + "vX.X.X" Docker tags (see release pipeline)

stages:
  - validate
  - docker

staging-integration-tests:
  stage: validate
  # image: [CI_IMAGE] — replaced by /setup init
  rules:
    - if: '$CI_COMMIT_BRANCH == "staging"'
  script:
    # [INSTALL_COMMAND] — replaced by /setup init
    - echo "Replace with your install command (e.g., npm ci, pip install -r requirements.txt)"
    # [VERIFY_COMMAND] — replaced by /setup init
    - echo "Replace with your verify command (e.g., npm run verify, pytest)"
    # [BUILD_COMMAND] — replaced by /setup init
    - echo "Replace with your build command (e.g., npm run build)"

staging-docker-latest:
  stage: docker
  rules:
    - if: '$CI_COMMIT_BRANCH == "staging"'
      exists:
        - Dockerfile
  image: docker:latest
  services:
    - docker:dind
  needs:
    - staging-integration-tests
  script:
    # [DOCKER_REGISTRY] — replace with your registry
    - docker build -t $CI_REGISTRY_IMAGE:latest .
    - docker push $CI_REGISTRY_IMAGE:latest
